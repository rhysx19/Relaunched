name: Build Windows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest
    strategy:
      matrix:
        platform: [x64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # WinUI/WindowsAppSDK PRI generation (ExpandPriContent) is a .NET Framework
      # MSBuild task that ships with Visual Studio; dotnet build's Core MSBuild
      # cannot load it, so the app must be built with VS MSBuild.
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: msbuild ClassicLaunchpad.sln /t:Restore /p:Configuration=Release /p:Platform=${{ matrix.platform }} /v:minimal

      - name: Build entire solution (Release)
        run: msbuild ClassicLaunchpad.sln /p:Configuration=Release /p:Platform=${{ matrix.platform }} /v:minimal /bl:msbuild.binlog

      # The WinUI XAML compiler often reports "XamlCompiler.exe exited with code 1"
      # without surfacing the real error in CLI builds; the details live in
      # obj/**/output.json. Dump and upload them when the build fails.
      - name: Show XAML compiler errors
        if: failure()
        shell: pwsh
        run: |
          Get-ChildItem -Recurse -Filter output.json -Path . -ErrorAction SilentlyContinue |
            ForEach-Object { Write-Host "=== $($_.FullName) ==="; Get-Content $_.FullName }

      - name: Upload build diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics
          path: |
            msbuild.binlog
            **/obj/**/output.json
          if-no-files-found: ignore

      - name: Run tests
        run: dotnet test ClassicLaunchpad.Tests/ClassicLaunchpad.Tests.csproj -c Release --no-build --verbosity normal

  # The Core library and test suite are cross-platform; running them on Linux
  # catches logic regressions quickly without needing a Windows runner.
  test-core-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Run Core tests
        run: dotnet test ClassicLaunchpad.Tests/ClassicLaunchpad.Tests.csproj -c Release --verbosity normal
