name: Build Windows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest
    strategy:
      matrix:
        platform: [x64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore NuGet packages
        run: dotnet restore ClassicLaunchpad.sln

      - name: Build entire solution (Release)
        run: dotnet build ClassicLaunchpad.sln -c Release -p:Platform=${{ matrix.platform }}

      - name: Run tests
        run: dotnet test ClassicLaunchpad.Tests/ClassicLaunchpad.Tests.csproj -c Release --no-build --verbosity normal
